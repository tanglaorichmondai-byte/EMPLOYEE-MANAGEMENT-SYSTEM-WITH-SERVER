<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Management System</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.getElementById('root');
        if (div) {
          div.innerHTML = '<div style="color: #ef4444; padding: 40px; font-family: sans-serif;">' +
            '<h3 style="font-weight: bold;">Application Error</h3>' +
            '<p style="font-size: 14px; margin-top: 8px;">' + msg + '</p>' +
            '<button onclick="location.reload()" style="margin-top: 16px; padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer;">Reload Application</button>' +
            '</div>';
        }
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: #64748b;">
        <div style="text-align: center;">
          <h2 style="font-weight: 800; margin-bottom: 8px;">Employee Management System</h2>
          <p style="font-size: 12px; color: #94a3b8;">Initializing workspace components...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
